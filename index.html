<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NRI Retirement Path Optimizer</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg-hero:#1a1a2e;
  --bg-body:#fbf9f4;
  --accent:#0066cc;
  --accent-soft:rgba(0,102,204,0.15);
}

/* Base */
body{
  font-family:'Lora', Georgia, serif;
  margin:0;
  background:var(--bg-body);
}

h1,h2,h3,h4,th{
  font-family:'Inter', sans-serif;
  letter-spacing:-0.01em;
}

/* Hero */
.hero{
  background:var(--bg-hero);
  color:#fff;
  text-align:center;
  padding:50px 20px;
}

.hero span{
  color:#ffd166;
}

/* Trust bar */
.trust-bar{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:14px;
  font-size:13px;
  color:#cbd5e1;
  opacity:0.85;
}

/* Inputs */
input,select{
  padding:10px;
  border:1px solid #ddd;
  border-radius:4px;
  width:100%;
}

input:focus,select:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 4px var(--accent-soft);
  transform:translateY(-1px);
  transition:all 0.2s ease;
}

/* Button */
.run-btn{
  background:#1a1a2e;
  color:#fff;
  padding:12px;
  border:none;
  border-radius:4px;
  cursor:pointer;
  transition:transform 0.1s ease;
}

.run-btn:active{
  transform:scale(0.98);
}

/* Decision card */
.decision{
  background:linear-gradient(135deg,#1a1a2e 0%,#2a2a4e 100%);
  color:#fff;
  padding:25px;
  border-radius:10px;
  margin-top:20px;
  box-shadow:0 20px 40px rgba(0,0,0,0.2);
}

/* Table */
.table-wrap{
  overflow-x:auto;
}

.yr-table{
  min-width:960px;
  border-collapse:collapse;
}

.yr-table th, .yr-table td{
  padding:10px;
  border-bottom:1px solid #efeee5;
}

/* RNOR */
.yr-table tr.rnor td{
  background:#e8f5ec;
}

/* ROR */
.yr-table tr.ror td{
  background:#fdecec;
}

/* Divider */
.ror-start td{
  border-top:3px solid #b91c1c;
  position:relative;
}

.ror-start td:first-child::before{
  content:"India tax starts here";
  position:absolute;
  top:-18px;
  left:0;
  background:#b91c1c;
  color:#fff;
  font-size:10px;
  padding:2px 6px;
  border-radius:4px;
}

/* Legend */
.legend{
  margin:10px 0;
  font-size:13px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>NRI Retirement <span>Path Optimizer</span></h1>
  <p>Best path under these assumptions</p>

  <!-- TRUST BAR -->
  <div class="trust-bar">
    <span>🔒 No login</span>
    <span>📡 No data collected</span>
  </div>
</div>

<div style="max-width:900px;margin:auto;padding:20px;">

<!-- INPUTS (kept simple placeholder) -->
<button class="run-btn">Run all 3 paths</button>

<!-- DECISION -->
<div class="decision">
  <h3>Path C &mdash; Optimized</h3>
  <p>Timing and geography advantage</p>
</div>

<!-- TABLE -->
<div class="legend">
  <span style="color:#1b7a3f;">■ RNOR</span>
  <span style="color:#b91c1c;">■ ROR</span>
</div>

<div class="table-wrap">
<table class="yr-table">
<thead>
<tr>
<th>Age</th>
<th>MAGI</th>
<th>Tax</th>
</tr>
</thead>

<tbody>
<tr class="rnor">
<td>60</td><td>40k</td><td>0</td>
</tr>

<tr class="ror-start ror">
<td>63</td><td>100k</td><td>High</td>
</tr>

<tr class="ror">
<td>64</td><td>110k</td><td>Higher</td>
</tr>

</tbody>
</table>
</div>

</div>

</body>
</html>
